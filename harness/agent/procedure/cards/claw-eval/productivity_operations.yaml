# T4a: Program Support Card - Productivity Operations
# Domain: productivity
# Assessment dimension: completion (35%) + trajectory (20%) + content (30%)

- name: productivity_operations
  description: >
    Productivity and office task management: manage todo lists, merge duplicate tasks,
    mark overdue items, update task status, organize meeting notes, summarize meetings,
    share notes with attendees, manage calendar events and reminders.
    Covers todo management (list, update, merge duplicates, mark complete),
    note operations (list, get, share), and meeting-related productivity workflows.
    Also handles: organize pending tasks, consolidate and tidy up todo items,
    mark overdue tasks, merge duplicate entries without deleting.
    待办整理：帮我整理一下待办、重复的合并掉、过期的标记一下、不要删除。
    会议总结：总结会议要点、发送给参会人员、整理会议笔记。
  domain: productivity
  program_goal: Complete productivity tasks by correctly invoking calendar, notes, email, todo, or other office services
  prerequisites:
    - Know what productivity services are available (calendar, notes, email, todo, inventory, etc.)
    - Can execute create, read, update, delete operations with correct parameters
    - Can verify that operations completed successfully by checking returned data
  steps:
    - "Step 1: List all available records (notes, tasks, events) to get an overview"
    - "Step 2: Retrieve detailed content from ALL relevant records — do not skip any potentially relevant ones"
    - "Step 3: Cross-reference multiple records to build complete picture (action items often span records)"
    - "Step 4: Extract structured information: assignees, deadlines, action items, participants"
    - "Step 5: Verify all required information is collected before executing any share/create/update operations"
    - "Step 6: Execute the final operation with verified parameters"
    - "Step 7: Confirm the final state matches the task requirements"
  trigger_keywords:
    - todo
    - notes
    - meeting
    - calendar
    - productivity
    - schedule
    - reminder
    - agenda
    - action item
    - assignee
    - 会议
    - 待办
    - 总结
    - 笔记
  common_pitfalls:
    - "CRITICAL — Zero tool calls: You MUST call at least one tool before giving your final answer. A pure text response with 0 tool calls is severely penalized. If web_search fails, try exec for calculations or use other available tools."
    - "CRITICAL — Search loop: If web_search returns empty 2-3 times, STOP and use your own knowledge. Do not burn all your turns on failed searches."
    - "CRITICAL — Underusing tools: Must list records first, then get EACH relevant record's details. One list call is NOT enough — partial information leads to incomplete actions and low completion score."
    - "Skipping records: Retrieve ALL relevant records — partial information leads to incomplete actions."
    - "Not cross-referencing: Action items in one record may reference details in another record."
    - "Missing required fields: Ensure assignees, deadlines, and recipients are all verified before sharing or updating."
    - "Wrong recipients: Only share with people explicitly mentioned in the records — do not guess."
    - "CRITICAL — Not verifying results: Always check that your final action (share, update, create) succeeded by examining the service response. If it failed, retry."
    - "Fabricating details: Every name, date, and fact in your output must come from tool results, not your memory or assumptions."
