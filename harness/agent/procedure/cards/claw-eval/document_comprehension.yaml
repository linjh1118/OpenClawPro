- name: document_comprehension
  description: 'Document reading and comprehension method: extract key information
    from documents, understand main points and details, explain concepts in accessible
    language, verify understanding of complex material

    '
  domain: comprehension
  program_goal: Accurately understand and explain document content in a way appropriate
    for the target audience
  prerequisites:
  - Ability to read and parse documents (PDF, text, etc.)
  - Can identify key information and main points
  - Can rephrase complex concepts in simpler terms
  steps:
  - 'Step 1: Read and extract the relevant document content'
  - 'Step 2: Identify the main topic, key points, and supporting details'
  - 'Step 3: Understand any technical terms or concepts mentioned'
  - 'Step 4: Rephrase or explain the content in the target format (simple language,
    summary, analysis, etc.)'
  - 'Step 5: Verify the explanation is accurate and complete'
  common_pitfalls:
  - 'Missing key information: Ensure all important points from the document are covered.'
  - 'Over-simplifying: Don''t lose important nuances when explaining simply.'
  - 'Not addressing the specific question: Tailor the explanation to what was asked.'
  trigger_keywords:
  - document
  - comprehend
  - explain
  - interpret
  - 文档
  - 阅读
  - 理解
  - 解释
