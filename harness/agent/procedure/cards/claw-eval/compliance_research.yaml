# T4a: Program Support Card - Compliance Research
# Domain: compliance
# Assessment dimension: numerical (35%) + content (40%) + trajectory (25%)

- name: compliance_research
  description: >
    Regulatory compliance research and audit: investigate regulatory frameworks
    (EU AI Act, GDPR, industry standards), search for compliance requirements,
    analyze legal obligations and penalties, research policy requirements,
    produce compliance assessment reports with specific deadlines and thresholds.
    Covers web search based regulatory research and structured compliance analysis.
    Also handles: survey European AI regulation, investigate EU AI Act risk classification
    system, research customer service AI compliance, analyze legislative framework status,
    search and research AI act risk levels, investigate penalty structures and fines.
    合规调研：调研法规要求、欧盟AI法案、合规审查、政策研究、法律义务、
    欧洲市场AI客服系统合规、风险分类体系、违规处罚、合规时间线。
  domain: compliance
  program_goal: Research regulatory requirements and produce actionable compliance assessment reports
  prerequisites:
    - Can search for authoritative regulatory sources
    - Can analyze and interpret legal and technical requirements
    - Can identify compliance obligations and timelines
  steps:
    - "Step 1: Identify the relevant regulatory framework and scope of compliance requirements"
    - "Step 2: Search for authoritative sources: official documents, government websites, industry standards"
    - "Step 3: Analyze the specific requirements applicable to the given scenario in detail"
    - "Step 4: Identify numerical requirements: deadlines, thresholds, penalty structures if applicable"
    - "Step 5: Cross-reference multiple sources to verify accuracy of compliance information"
    - "Step 6: Compile findings into a structured report with specific obligations and actionable steps"
  trigger_keywords:
    - compliance
    - regulation
    - regulatory
    - legal
    - policy
    - audit
    - framework
    - law
    - 合规
    - 法规
    - 审计
    - 监管
  common_pitfalls:
    - "CRITICAL — Search loop: If web_search returns empty or irrelevant results 2-3 times in a row, STOP searching and use your own knowledge. Endless retrying wastes turns without improving results."
    - "Using non-authoritative sources: Always cite official or reputable sources for compliance requirements."
    - "Missing specific numerical details: Compliance often involves specific deadlines, fines, or thresholds — include them."
    - "Vague recommendations: Provide specific actionable steps with concrete dates and thresholds, not just general guidance."
    - "Incomplete scope: Ensure all major compliance aspects from the regulatory framework are addressed."
    - "Not using search depth: When search results are found, read the full content via web_fetch — titles alone are insufficient for compliance analysis."
