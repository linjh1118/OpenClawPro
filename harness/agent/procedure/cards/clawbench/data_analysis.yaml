name: clawbench_official_data_analysis
description: Data analysis, database, and data science tasks — SQL queries and SQLite
  operations, descriptive statistics (mean, median, mode, std_dev) from CSV data,
  K-Means clustering with elbow method and min-max normalization, pandas data pipelines,
  statistical tests, JOINs and GROUP BY, IQR outlier detection, quartile computation,
  sales report generation with template filling
domain: ''
program_goal: Analyze structured data accurately and produce verified output files
  matching the exact specification
prerequisites:
- All required input files must exist in the workspace before starting — never fabricate
  or create missing input data
- Understand the data schema (columns, types, relationships) before any computation
trigger_keywords:
- data analysis
- data-analysis
- data science
- database
- sql
- sqlite
- query
- statistics
- pipeline
- pandas
- numpy
- aggregate
- filter
- mean median mode
- clustering
- markdown report
- sales summary
- ytd
- pipeline stage
- data processing
- outlier
- outlier detection
- iqr
- interquartile
- quartile
- percentile
- sales report
- report template
- template filling
common_pitfalls:
- Never fabricate input data — if required files are missing, report the error instead
  of creating fake data
- Always verify numerical totals by independently re-computing from source values
- When standardizing data, use empty string or null for missing values — never use
  placeholder strings like 'unknown' that could break downstream parsing
- Use json.dumps() to serialize Python values — never str(True) which gives the string
  'True' instead of JSON boolean true
- For pipeline stages, ensure each stage output has a flat, well-defined schema that
  downstream stages can parse
- 'For IQR/outlier detection: use statistics.quantiles(data, n=4) for quartile computation
  (exclusive method). Do NOT use numpy.percentile with interpolation=''linear'' —
  it uses the inclusive method and gives different Q1/Q3 values. statistics.quantiles
  returns [Q1, Q2, Q3] for n=4'
- 'For report template filling: replace ALL placeholders (e.g. {{YTD_TOTAL}}, {{REPORT_DATE}})
  — verify none remain. Format numbers with commas using f''{value:,.2f}''. Sort tables
  by the specified column. Use today''s date in YYYY-MM-DD format'
- When standardizing data, use empty string or null for missing values — never use
  placeholder strings like unknown that could break downstream parsing
steps:
- 'Step 1: Read all input files (CSVs, databases, JSON) to understand the data schema
  before analysis'
- 'Step 2: For SQL tasks: understand the database schema (tables, columns, relationships).
  Write queries with appropriate JOINs, GROUP BY, and HAVING clauses'
- 'Step 3: For statistical analysis: use pandas for data manipulation, scipy.stats
  for statistical tests (t-test, chi-square, correlation)'
- 'Step 4: For data pipelines: chain operations: load → clean → transform → aggregate
  → output'
- 'Step 5: Handle missing values explicitly: df.fillna() or df.dropna() with justification
  in comments'
- 'Step 6: For database operations: use sqlite3 (built into Python) for .db files.
  Write results to CSV or JSON as specified'
- 'Step 7: Generate a structured analysis report with: data overview, methodology,
  findings, and conclusion'
- 'Step 8: Verify the output file exists and matches the required format before completing'
examples:
- 'Correct: sqlite3.connect(''db'') → cursor.execute(''SELECT ... FROM t1 JOIN t2
  ON ... GROUP BY ...'') → fetchall() → write CSV'
- 'Correct: pd.merge(df1, df2, on=''id'', how=''left'') → df.groupby(''category'').agg({''value'':
  ''sum''})'
- 'Wrong: skip the data inspection step and assume column names — always df.head()
  and df.info() first'
compact: K-Means with elbow method (k=3,4,5) — MinMaxScaler normalization — SQL JOINs,
  GROUP BY, HAVING — pandas for data pipelines
