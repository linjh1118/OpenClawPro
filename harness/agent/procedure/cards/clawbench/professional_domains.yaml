name: clawbench_official_professional_domains
description: Clinical healthcare and market research — HIPAA patient data de-identification
  and privacy (replace names with anonymous IDs, remove SSN, generalize DOB), patient
  data and lab value interpretation (mg/dL, mmol/L), pharmaceutical trial data, customer
  survey NPS analysis, market segmentation and competitor analysis, drug interaction
  checking
domain: ''
program_goal: Perform domain-specific analysis accurately with correct calculations,
  unit handling, and matching logic
prerequisites:
- All required input files must exist in the workspace before starting — never fabricate
  missing input data
- Read every document completely before beginning any analysis
trigger_keywords:
- clinical
- medical
- healthcare
- market research
- environmental
- energy
- climate
- emissions
- carbon
- pharmaceutical
- clinical trial
- patient
- hospital
- diagnosis
- drug
- drug interaction
- medication
- market segment
- competitor
- trend
- renewable
common_pitfalls:
- Never fabricate input data — if required files are missing, report the error instead
  of creating fake data
- 'When comparing pairs of items (e.g., drug interactions), normalize both sides:
  use tuple(sorted([a.lower(), b.lower()])) for consistent matching regardless of
  order or case'
- 'For drug interaction reports: generate ALL patient-drug-interaction combinations.
  For each patient, enumerate all unique pairs of their medications using itertools.combinations(meds,
  2). Check each pair (in both directions) against the interaction database. Include
  patients with no interactions as empty lists'
- '''For clinical data: be precise with calculations and units. Report findings with''
  appropriate clinical context'
- Always verify numerical results by independently re-computing from source values
- Use json.dumps() to serialize Python values — never str(True) which gives 'True'
  instead of JSON true
- 'When comparing pairs of items (e.g., drug interactions), normalize both sides:
  use tuple(sorted([a.lower(), b.lower()])) for consistent matching regardless of
  order or case. IMPORTANT: in the output, drug_a and drug_b MUST be in alphabetically
  sorted order — always output pair[0].capitalize() as drug_a and pair[1].capitalize()
  as drug_b, where pair = tuple(sorted([med1.lower(), med2.lower()]))'
- 'For drug interaction output format: preserve the exact field names from the interaction
  database (drug_a, drug_b, severity, effect). Output the patient keys in sorted
  order'
steps:
- 'Step 1: Read all input data files carefully — medical records, market datasets,
  environmental measurements, energy output logs'
- 'Step 2: For clinical/medical data: understand HL7/FHIR formats, lab value units
  (mg/dL, mmol/L), reference ranges. Flag abnormal values explicitly'
- 'Step 3: For market research: identify market segments, key players, pricing trends,
  and competitive landscape from the provided data'
- 'Step 4: For environmental/energy data: parse time-series (hourly/daily readings),
  compute totals, averages, and identify peaks or anomalies'
- 'Step 5: For clinical data: be precise with calculations and units. Report findings
  with appropriate clinical context (reference ranges, normal thresholds)'
- 'Step 6: Write results to the required format with domain-appropriate precision
  and units (do not round clinical lab values)'
- 'Step 7: Verify the output matches the required format — check column names, units,
  and value ranges against the task specification'
- 'Step 8: Do not fabricate data — use only values found in the provided input files'
examples:
- 'Correct: for clinical: flag lab values outside reference range — Na < 137 mmol/L
  or K > 5.0 mmol/L'
- 'Correct: market research: segment analysis by price tier, identify top 3 competitors
  by market share'
- 'Wrong: skip reading the data and rely on general domain knowledge — always verify
  against provided files'
compact: Clinical lab values with units and reference ranges — NPS score from survey
  responses — patient diagnosis data — market segment by price tier
